<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="hud">
          <div class="title-block">
            <p class="eyebrow">Classic Snake</p>
            <h1>Snake</h1>
            <p class="subtitle">Eat the food, grow the trail, and avoid the walls.</p>
          </div>
          <div class="stats" aria-live="polite">
            <p class="stat-card"><span class="stat-label">Score</span><span id="score">0</span></p>
            <p class="stat-card"><span class="stat-label">Status</span><span id="status">Running</span></p>
          </div>
        </div>

        <div class="actions">
          <button id="restart-button" type="button">Restart</button>
          <button id="pause-button" type="button">Pause</button>
        </div>

        <div class="board-wrap">
          <div
            id="game-board"
            class="board"
            role="grid"
            aria-label="Snake game board"
          ></div>
        </div>

        <div class="instructions">
          <p>Arrow keys or WASD move the snake.</p>
          <p>Space pauses. Enter restarts after game over.</p>
        </div>

        <div class="controls" aria-label="Touch controls">
          <button class="control up" data-direction="up" type="button" aria-label="Move up">▲</button>
          <button class="control left" data-direction="left" type="button" aria-label="Move left">◀</button>
          <button class="control down" data-direction="down" type="button" aria-label="Move down">▼</button>
          <button class="control right" data-direction="right" type="button" aria-label="Move right">▶</button>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
